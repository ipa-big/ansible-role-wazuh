---
# Purpose: verify Wazuh backend deployment state
# Molecule calls this playbook with `molecule verify`
- name: Verify Wazuh Backend Deployment
  hosts: wazuh-backend
  gather_facts: false
  become: true
  vars:
    # Wazuh service names from docker-compose
    wazuh_services:
      - single-node-wazuh.manager-1
      - single-node-wazuh.indexer-1
      - single-node-wazuh.dashboard-1
    
    # Required listening ports
    wazuh_required_ports:
      - port: 443
      - port: 1514
      - port: 1515
      - port: 9200
      - port: 55000
    
    # Docker Compose project directory
    wazuh_compose_dir: "{{ fabos_wazuh_default_backend_compose_dir | default('/opt/wazuh') }}"
  
  tasks:
    - name: Verify Wazuh containers are running
      ansible.builtin.shell: |
        docker ps --format "{{ "{{" }}.Names{{ "}}" }}"
      register: running_containers
      changed_when: false
    
    - name: Check that all Wazuh services are running
      ansible.builtin.assert:
        that:
          - item in running_containers.stdout_lines
        fail_msg: "Service {{ item }} is not running"
        success_msg: "Service {{ item }} is running"
      loop: "{{ wazuh_services }}"
      loop_control:
        label: "{{ item }}"
    
    - name: Verify Wazuh required ports are listening
      ansible.builtin.wait_for:
        port: "{{ item.port }}"
        timeout: 5
      loop: "{{ wazuh_required_ports }}"
      loop_control:
        label: "Port {{ item.port }}"
      register: port_check_result
      changed_when: false


