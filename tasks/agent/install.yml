---
- name: Assert Inputs
  ansible.builtin.assert:
    that:
      - (fabos_wazuh_manager_ip is defined) and (fabos_wazuh_manager_ip | length > 0)

- name: Install required packages for Wazuh repository
  ansible.builtin.apt:
    name:
      - gnupg
      - apt-transport-https
    state: present
    update_cache: yes

- name: Add Wazuh APT repository and manage its key natively
  ansible.builtin.deb822_repository:
    name: wazuh
    types: [deb]
    uris: [https://packages.wazuh.com/4.x/apt/]
    suites: [stable]
    components: [main]
    signed_by: https://packages.wazuh.com/key/GPG-KEY-WAZUH
    state: present

- name: Install Wazuh agent
  ansible.builtin.apt:
    name: wazuh-agent
    state: present
    update_cache: yes
  environment:
    WAZUH_MANAGER: "{{ fabos_wazuh_manager_ip }}"

- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: yes

- name: Start Wazuh agent service
  ansible.builtin.systemd:
    name: wazuh-agent
    state: started
    enabled: yes
