---
- name: Stat compose directory
  ansible.builtin.stat:
    path: "{{ fabos_wazuh_default_single_node_compose_dir }}"
  register: compose_dir

- name: Remove docker compose workloads
  when: compose_dir.stat.exists
  community.docker.docker_compose_v2:
    project_src: "{{ fabos_wazuh_default_single_node_compose_dir }}"
    files: "{{ [item] }}"
    state: absent
  loop: "{{ fabos_wazuh_default_compose_files }}"

- name: Remove Wazuh Docker repository
  ansible.builtin.file:
    path: "{{ fabos_wazuh_default_wazuh_docker_dir }}"
    state: absent
